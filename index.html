<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crude Oil Spreads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --bg: #131316;
    --surface: #1c1c20;
    --surface2: #242429;
    --border: rgba(255, 255, 255, 0.07);
    --text: #ededf0;
    --muted: #7c7c85;
    --accent: #5b9bf7;
    --accent2: rgba(91, 155, 247, 0.12);
    --positive: #34d399;
    --negative: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .page { max-width: 1240px; margin: 0 auto; padding: 28px 24px 32px; }

  h1 {
    margin-bottom: 20px;
    color: var(--text);
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  /* ── Pair tabs ── */
  .pair-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }

  .pair-tab {
    padding: 6px 12px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    margin-bottom: 8px;
    transition: color 0.12s ease, background 0.12s ease;
  }

  .pair-tab:hover { color: var(--text); background: var(--surface2); }

  .pair-tab.active {
    color: var(--accent);
    background: var(--accent2);
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .toolbar-row {
    display: flex;
    gap: 6px;
    align-items: center;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .toolbar-row::-webkit-scrollbar { display: none; }

  .toolbar-row + .toolbar-row {
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .toolbar-label {
    flex: 0 0 auto;
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-right: 4px;
  }

  .toolbar-sep {
    flex: 0 0 auto;
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 2px;
  }

  .chip {
    flex: 0 0 auto;
    padding: 5px 10px;
    border: 1px solid transparent;
    border-radius: 6px;
    background: var(--surface2);
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.12s ease, color 0.12s ease, background 0.12s ease;
  }

  .chip:hover {
    color: var(--text);
    background: rgba(255, 255, 255, 0.08);
  }

  .chip.active {
    border-color: rgba(91, 155, 247, 0.25);
    background: var(--accent2);
    color: var(--accent);
  }

  .chip.active[data-overlay] {
    border-color: var(--chip-color, rgba(91, 155, 247, 0.25));
    background: var(--chip-bg, var(--accent2));
    color: var(--chip-color, var(--accent));
  }

  /* ── Chart panels ── */
  .chart-shell {
    padding: 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .chart-shell + .chart-shell { margin-top: 10px; }

  .chart-frame {
    position: relative;
    width: 100%;
    height: clamp(360px, calc(100vh - 240px), 720px);
    min-height: 360px;
  }

  canvas { display: block; width: 100% !important; height: 100% !important; }

  /* ── Callout ── */
  .callout {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 6px;
    padding: 0 4px;
  }

  .callout-value {
    font-size: 32px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .callout-value.positive { color: var(--positive); }
  .callout-value.negative { color: var(--negative); }

  .callout-meta { color: var(--muted); font-size: 13px; font-weight: 500; line-height: 1.3; }
  .callout-change { font-weight: 600; font-variant-numeric: tabular-nums; }
  .callout-change.up { color: var(--positive); }
  .callout-change.down { color: var(--negative); }

  /* ── Custom tooltip ── */
  #chartTooltip {
    position: absolute;
    pointer-events: none;
    z-index: 100;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 12px;
    color: var(--text);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    opacity: 0;
    transition: opacity 0.12s ease;
    white-space: nowrap;
  }

  .tt-title {
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    font-size: 11px;
  }

  .tt-line {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 0;
  }

  .tt-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .tt-line strong {
    font-weight: 600;
    color: var(--text);
  }

  /* ── Stats row ── */
  .stats-row {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    padding: 0 4px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
  }

  .stat-item { display: flex; gap: 5px; align-items: baseline; }
  .stat-label { text-transform: uppercase; font-size: 10px; letter-spacing: 0.06em; font-weight: 600; }
  .stat-val { font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }

  /* ── Legend ── */
  .legend-bar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px 16px;
    margin-top: 10px;
    padding: 0 4px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .legend-item { display: flex; align-items: center; gap: 5px; white-space: nowrap; }

  .legend-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Stacked panels ── */
  .spot-frame { position: relative; width: 100%; height: 180px; }

  .panel-label {
    text-align: right;
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 6px;
    opacity: 0.5;
  }

  /* ── Term structure ── */
  .term-section { margin-top: 32px; margin-bottom: 10px; }

  .term-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 4px;
  }

  .term-header h2 {
    margin: 0;
    color: var(--text);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }

  .term-header-meta { color: var(--muted); font-size: 11px; font-weight: 500; }

  .term-frame { position: relative; width: 100%; height: 220px; }

  /* ── Footer ── */
  .site-footer {
    margin-top: 32px;
    padding: 16px 4px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    line-height: 1.6;
  }

  .site-footer a {
    color: var(--muted);
    text-decoration: underline;
    text-decoration-color: rgba(255, 255, 255, 0.15);
    text-underline-offset: 2px;
  }
  .site-footer a:hover { color: var(--text); }

  /* ── Mobile ── */
  @media (max-width: 760px) {
    .page { padding: 18px 14px 20px; }
    h1 { margin-bottom: 16px; font-size: 24px; }
    .pair-tabs { margin-bottom: 12px; }
    .pair-tab { padding: 5px 10px; font-size: 12px; }
    .toolbar { margin-bottom: 12px; padding: 10px 12px; border-radius: 8px; }
    .chart-shell { padding: 12px; border-radius: 8px; }
    .chart-frame { height: clamp(320px, calc(100vh - 220px), 560px); min-height: 320px; }
    .spot-frame { height: 140px; }
    .term-frame { height: 180px; }
    .term-section { margin-top: 24px; }
    .legend-bar { font-size: 10px; gap: 6px 12px; }
  }
</style>
</head>
<body>
  <main class="page">
    <h1>Crude Oil Spreads</h1>

    <nav class="pair-tabs" id="pairTabs"></nav>

    <section class="toolbar">
      <div class="toolbar-row" id="spotControls"></div>
      <div class="toolbar-row" id="futuresControls"></div>
      <div class="toolbar-row" id="rangeControls"></div>
    </section>

    <div class="callout" id="callout"></div>
    <div class="stats-row" id="statsRow"></div>

    <div class="term-section" id="termSection">
      <div class="term-header">
        <h2>Term Structure</h2>
        <span class="term-header-meta" id="termMeta"></span>
      </div>
      <section class="chart-shell">
        <div class="term-frame">
          <canvas id="termChart"></canvas>
        </div>
      </section>
    </div>

    <section class="chart-shell" id="spotPanel" style="display:none">
      <div class="spot-frame">
        <canvas id="spotChart"></canvas>
      </div>
      <div class="panel-label">Spot Prices</div>
    </section>

    <section class="chart-shell">
      <div class="chart-frame">
        <canvas id="chart"></canvas>
      </div>
      <div class="panel-label">Spread</div>
    </section>

    <div class="legend-bar" id="legend"></div>

    <footer class="site-footer" id="siteFooter"></footer>
  </main>

  <script src="./benchmark_data.js?v=20260409"></script>
  <script src="./futures_data.js?v=20260409"></script>
  <script>
    /* ── Constants ─────────────────────────────────────────────── */

    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                        'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

    const RANGES = [
      { key: '1w',  label: '1W',  days: 7 },
      { key: '1m',  label: '1M',  days: 31 },
      { key: '6m',  label: '6M',  days: 183 },
      { key: '1y',  label: '1Y',  days: 365 },
      { key: '3y',  label: '3Y',  days: 365 * 3 },
      { key: '5y',  label: '5Y',  days: 365 * 5 },
      { key: 'max', label: 'Max', days: null },
    ];

    const PAIRS = [
      { key: 'brent_wti',   label: 'Brent − WTI',   tabLabel: 'Brent − WTI',   dataset: 'daily',   left: 'brent', right: 'wti' },
      { key: 'brent_dubai', label: 'Brent − Dubai',  tabLabel: 'Brent − Dubai',  dataset: 'monthly', left: 'brent', right: 'dubai' },
      { key: 'wti_dubai',   label: 'WTI − Dubai',    tabLabel: 'WTI − Dubai',    dataset: 'monthly', left: 'wti',   right: 'dubai' },
      { key: 'wti_opec',    label: 'WTI − OPEC',     tabLabel: 'WTI − OPEC',     dataset: 'monthly', left: 'wti',   right: 'opec' },
      { key: 'brent_opec',  label: 'Brent − OPEC',   tabLabel: 'Brent − OPEC',   dataset: 'monthly', left: 'brent', right: 'opec' },
    ];

    const SERIES_COLORS = {
      spread: '#5b9bf7',
      ma: '#f5a524',
      wti: '#34d399',
      brent: '#f87171',
      dubai: '#c084fc',
      opec: '#fb923c',
    };

    const TENOR_COLORS = {
      '1m': '#94a3b8', '2m': '#2dd4bf', '3m': '#4ade80',
      '6m': '#e879a8', '12m': '#e8a050', '24m': '#a78bfa',
    };

    const TENOR_LABELS = {
      '1m': '1m', '2m': '2m', '3m': '3m',
      '6m': '6m', '12m': '12m', '24m': '24m',
    };

    /* ── State ─────────────────────────────────────────────────── */

    const state = {
      pairKey: 'brent_wti',
      rangeKey: '1y',
      overlays: {
        ma: true,
        wti: false, brent: false, dubai: false, opec: false,
        '1m': true, '2m': false, '3m': false,
        '6m': false, '12m': false, '24m': false,
      },
    };

    /* ── Utilities ─────────────────────────────────────────────── */

    function isCompact() { return window.matchMedia('(max-width: 760px)').matches; }
    function getPair(key) { return PAIRS.find(p => p.key === key) ?? PAIRS[0]; }
    function getRange(key) { return RANGES.find(r => r.key === key) ?? RANGES[0]; }

    function dateToUtc(v) {
      const [y, m, d] = v.split('-').map(Number);
      return Date.UTC(y, m - 1, d);
    }

    function parseFuturesTs(ts) {
      const parts = ts.split(' ');
      const [y, m, d] = parts[0].split('-').map(Number);
      if (parts.length > 1) { const [h, min] = parts[1].split(':').map(Number); return Date.UTC(y, m - 1, d, h, min); }
      return Date.UTC(y, m - 1, d);
    }

    function fmtDate(s) {
      const [y, m, d] = s.split('-');
      return `${monthNames[Number(m) - 1]} ${Number(d)}, ${y}`;
    }

    function getMaLabel(pair) { return pair.dataset === 'monthly' ? '12m MA' : '20d MA'; }

    function getBenchmarkLabel(key) {
      return window.BENCHMARK_DATA.benchmarkLabels[key] ?? key;
    }

    function getAvailableBenchmarks(pair) {
      if (pair.dataset === 'daily') return ['wti', 'brent'];
      return window.BENCHMARK_DATA[pair.dataset].columns;
    }

    /* ── Data helpers ──────────────────────────────────────────── */

    function buildRowsForDataset(key) {
      const ds = window.BENCHMARK_DATA[key];
      if (!ds) throw new Error(`Missing dataset: ${key}`);
      return ds.rows.map(raw => {
        const row = { date: raw[0] };
        ds.columns.forEach((col, i) => { row[col] = raw[i + 1]; });
        return row;
      });
    }

    function buildRowsForPair(pair) {
      return buildRowsForDataset(pair.dataset)
        .filter(row => row[pair.left] !== null && row[pair.right] !== null);
    }

    function filterByRange(rows, key, anchorDate = null) {
      const range = getRange(key);
      if (range.days === null || rows.length === 0) return rows.slice();
      const latest = dateToUtc(anchorDate ?? rows[rows.length - 1].date);
      const cutoff = latest - range.days * 86400000;
      return rows.filter(row => dateToUtc(row.date) >= cutoff);
    }

    function movingAverage(values, win) {
      return values.map((_, i) => {
        if (i < win - 1) return null;
        let sum = 0;
        for (let j = i - win + 1; j <= i; j++) sum += values[j];
        return +(sum / win).toFixed(2);
      });
    }

    /* ── Pair tabs ─────────────────────────────────────────────── */

    function renderPairTabs() {
      document.getElementById('pairTabs').innerHTML = PAIRS.map(p => `
        <button class="pair-tab ${state.pairKey === p.key ? 'active' : ''}" data-pair="${p.key}">${p.tabLabel}</button>
      `).join('');

      document.querySelectorAll('[data-pair]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.pairKey = btn.dataset.pair;
          renderAll();
        });
      });
    }

    /* ── Toolbar ───────────────────────────────────────────────── */

    function renderToolbar() {
      const pair = getPair(state.pairKey);
      const benchmarks = getAvailableBenchmarks(pair);
      const hasFutures = state.pairKey === 'brent_wti' && window.FUTURES_DATA;

      // Spot row: MA + benchmark spot prices
      const spotChips = [];
      spotChips.push(chipHtml('ma', getMaLabel(pair), SERIES_COLORS.ma));
      for (const k of benchmarks) {
        spotChips.push(chipHtml(k, getBenchmarkLabel(k), SERIES_COLORS[k]));
      }
      document.getElementById('spotControls').innerHTML = `
        <span class="toolbar-label">Spot</span>
        ${spotChips.join('')}
      `;

      // Futures row (Brent-WTI only)
      const futuresEl = document.getElementById('futuresControls');
      if (hasFutures) {
        const futuresChips = window.FUTURES_DATA.tenors.map(t =>
          chipHtml(t, TENOR_LABELS[t], TENOR_COLORS[t])
        ).join('');
        futuresEl.innerHTML = `
          <span class="toolbar-label">Futures</span>
          ${futuresChips}
        `;
        futuresEl.style.display = '';
      } else {
        futuresEl.innerHTML = '';
        futuresEl.style.display = 'none';
      }

      // Range row
      document.getElementById('rangeControls').innerHTML = `
        <span class="toolbar-label">Range</span>
        ${RANGES.map(r => `
          <button class="chip ${state.rangeKey === r.key ? 'active' : ''}" data-range="${r.key}">${r.label}</button>
        `).join('')}
      `;

      // Listeners
      document.querySelectorAll('[data-overlay]').forEach(btn => {
        btn.addEventListener('click', () => {
          const k = btn.dataset.overlay;
          state.overlays[k] = !state.overlays[k];
          renderToolbar(); renderLegend(); rebuildChart();
        });
      });

      document.querySelectorAll('[data-range]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.rangeKey = btn.dataset.range;
          renderToolbar(); renderStats(); rebuildChart();
        });
      });
    }

    function chipHtml(key, label, color) {
      const active = state.overlays[key] ? 'active' : '';
      return `<button class="chip ${active}" data-overlay="${key}"
        style="--chip-color: ${color}; --chip-bg: ${color}20">${label}</button>`;
    }

    /* ── Legend ─────────────────────────────────────────────────── */

    function renderLegend() {
      const pair = getPair(state.pairKey);
      const items = [];

      // Spread is always shown
      items.push(legendItem('Spread', SERIES_COLORS.spread));

      if (state.overlays.ma) items.push(legendItem(getMaLabel(pair), SERIES_COLORS.ma));

      for (const k of getAvailableBenchmarks(pair)) {
        if (state.overlays[k]) items.push(legendItem(getBenchmarkLabel(k), SERIES_COLORS[k]));
      }

      if (state.pairKey === 'brent_wti' && window.FUTURES_DATA) {
        for (const t of window.FUTURES_DATA.tenors) {
          if (state.overlays[t]) items.push(legendItem(`${TENOR_LABELS[t]} Futures`, TENOR_COLORS[t]));
        }
      }

      document.getElementById('legend').innerHTML = items.join('');
    }

    function legendItem(label, color) {
      return `<span class="legend-item"><span class="legend-dot" style="background:${color}"></span>${label}</span>`;
    }

    /* ── Callout ───────────────────────────────────────────────── */

    function renderCallout() {
      const pair = getPair(state.pairKey);
      const rows = buildRowsForPair(pair);
      if (rows.length < 2) { document.getElementById('callout').innerHTML = ''; return; }

      const latest = rows[rows.length - 1];
      const previous = rows[rows.length - 2];
      const spread = +(latest[pair.left] - latest[pair.right]).toFixed(2);
      const prev = +(previous[pair.left] - previous[pair.right]).toFixed(2);
      const change = +(spread - prev).toFixed(2);
      const sign = change >= 0 ? '+' : '';
      const dir = change >= 0 ? 'up' : 'down';

      const dateLabel = pair.dataset === 'monthly'
        ? (() => { const [y, m] = latest.date.split('-'); return `${monthNames[Number(m) - 1]} ${y}`; })()
        : fmtDate(latest.date);

      document.getElementById('callout').innerHTML = `
        <span class="callout-value ${spread >= 0 ? 'positive' : 'negative'}">$${spread.toFixed(2)}</span>
        <span class="callout-meta">
          <span class="callout-change ${dir}">${sign}${change.toFixed(2)}</span>
          &middot; ${pair.label} ${pair.dataset === 'daily' ? 'Spot ' : ''}Spread ${dateLabel}
        </span>
      `;
    }

    /* ── Stats row ─────────────────────────────────────────────── */

    function renderStats() {
      const pair = getPair(state.pairKey);
      const rows = filterByRange(buildRowsForPair(pair), state.rangeKey);
      if (rows.length === 0) { document.getElementById('statsRow').innerHTML = ''; return; }

      const spreads = rows.map(r => +(r[pair.left] - r[pair.right]).toFixed(2));
      const high = Math.max(...spreads);
      const low = Math.min(...spreads);
      const avg = +(spreads.reduce((a, b) => a + b, 0) / spreads.length).toFixed(2);

      const rangeLabel = getRange(state.rangeKey).label;

      document.getElementById('statsRow').innerHTML = `
        <span class="stat-item"><span class="stat-label">${rangeLabel} High</span> <span class="stat-val">$${high.toFixed(2)}</span></span>
        <span class="stat-item"><span class="stat-label">Low</span> <span class="stat-val">$${low.toFixed(2)}</span></span>
        <span class="stat-item"><span class="stat-label">Avg</span> <span class="stat-val">$${avg.toFixed(2)}</span></span>
      `;
    }

    /* ── Footer ────────────────────────────────────────────────── */

    function renderFooter() {
      const pair = getPair(state.pairKey);
      const rows = buildRowsForPair(pair);
      const lastDate = rows.length ? rows[rows.length - 1].date : '—';
      const isMonthly = pair.dataset === 'monthly';
      const priceLabel = isMonthly ? 'Monthly average prices' : 'Spot data';
      const hasOpec = pair.left === 'opec' || pair.right === 'opec'
        || Object.keys(state.overlays).includes('opec');
      document.getElementById('siteFooter').innerHTML = `
        ${priceLabel} from <a href="https://fred.stlouisfed.org/" target="_blank" rel="noopener">FRED</a>.
        ${!isMonthly ? 'Futures from <a href="https://finance.yahoo.com/" target="_blank" rel="noopener">Yahoo Finance</a>.' : ''}
        OPEC basket from <a href="https://countryeconomy.com/raw-materials/opec" target="_blank" rel="noopener">countryeconomy.com</a>.
        Data through ${lastDate}.
      `;
    }

    /* ── Crosshair plugin ──────────────────────────────────────── */

    const crosshairPlugin = {
      id: 'crosshairLine',
      afterDraw(chart) {
        if (chart._crosshairX == null) return;
        const { ctx, chartArea: { top, bottom } } = chart;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(chart._crosshairX, top);
        ctx.lineTo(chart._crosshairX, bottom);
        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.setLineDash([4, 3]);
        ctx.stroke();
        ctx.restore();
      },
    };

    Chart.register(crosshairPlugin);

    /* ── Custom tooltip ───────────────────────────────────────── */

    function findNearestInChart(chartInstance, hoveredX) {
      const lines = [];
      if (!chartInstance) return lines;
      const maxGapMs = 7 * 86400000;

      for (let i = 0; i < chartInstance.data.datasets.length; i++) {
        const ds = chartInstance.data.datasets[i];
        const meta = chartInstance.getDatasetMeta(i);
        if (meta.hidden || ds.hidden) continue;

        const data = ds.data.filter(p => p !== null && p !== undefined);
        if (data.length === 0) continue;

        let nearest = null;
        let bestDist = Infinity;
        for (let j = 0; j < data.length; j++) {
          const px = typeof data[j] === 'object' ? data[j].x : j;
          const dist = Math.abs(px - hoveredX);
          if (dist < bestDist) { bestDist = dist; nearest = data[j]; }
        }

        if (nearest && bestDist <= maxGapMs) {
          const val = typeof nearest === 'object' ? nearest.y : nearest;
          if (val !== null && val !== undefined) {
            lines.push({ label: ds.label, val, color: ds.borderColor });
          }
        }
      }
      return lines;
    }

    function buildCrosshairTooltip(context, pair) {
      const { chart: hoverChart, tooltip } = context;
      let tooltipEl = document.getElementById('chartTooltip');

      if (!tooltipEl) {
        tooltipEl = document.createElement('div');
        tooltipEl.id = 'chartTooltip';
        document.body.appendChild(tooltipEl);
      }

      // Also sync crosshair on the other chart
      const otherChart = (hoverChart === chart) ? spotChartInstance : chart;

      if (tooltip.opacity === 0) {
        tooltipEl.style.opacity = '0';
        hoverChart._crosshairX = null;
        if (otherChart) { otherChart._crosshairX = null; otherChart.draw(); }
        hoverChart.draw();
        return;
      }

      const hoveredX = tooltip.dataPoints?.[0]?.parsed?.x;
      if (hoveredX == null) { tooltipEl.style.opacity = '0'; return; }

      // Set crosshair on hovered chart
      hoverChart._crosshairX = tooltip.caretX;

      // Set crosshair on the other chart at the same x value
      if (otherChart && otherChart.chartArea) {
        const xScale = otherChart.scales.x;
        if (xScale) {
          otherChart._crosshairX = xScale.getPixelForValue(hoveredX);
          otherChart.draw();
        }
      }

      // Gather lines from BOTH charts
      const allLines = [
        ...findNearestInChart(spotChartInstance, hoveredX),
        ...findNearestInChart(chart, hoveredX),
      ];

      const d = new Date(hoveredX);
      const mo = monthNames[d.getUTCMonth()];
      const dy = d.getUTCDate();
      const yr = d.getUTCFullYear();
      const title = pair.dataset === 'monthly' ? `${mo} ${yr}` : `${mo} ${dy}, ${yr}`;

      const html = allLines.map(l =>
        `<div class="tt-line"><span class="tt-dot" style="background:${l.color}"></span>${l.label}: <strong>$${l.val.toFixed(2)}</strong></div>`
      ).join('');

      tooltipEl.innerHTML = `<div class="tt-title">${title}</div>${html}`;
      tooltipEl.style.opacity = '1';

      // Position near the spread chart (the larger one)
      const pos = (chart ?? hoverChart).canvas.getBoundingClientRect();
      const left = pos.left + window.scrollX + tooltip.caretX;
      const top = pos.top + window.scrollY + (chart ?? hoverChart).chartArea.top;

      tooltipEl.style.left = left + 12 + 'px';
      tooltipEl.style.top = top + 'px';

      const rect = tooltipEl.getBoundingClientRect();
      if (rect.right > window.innerWidth - 10) {
        tooltipEl.style.left = (left - rect.width - 12) + 'px';
      }

      hoverChart.draw();
    }

    /* ── Main chart ────────────────────────────────────────────── */

    let chart = null;
    let spotChartInstance = null;

    function resetCanvas(id) {
      const c = document.getElementById(id);
      c.removeAttribute('width'); c.removeAttribute('height');
      c.style.width = ''; c.style.height = '';
    }

    function destroyCanvasChart(id) {
      const c = document.getElementById(id);
      const existing = Chart.getChart(c);
      if (existing) existing.destroy();
    }

    function rebuildChart() {
      destroyCanvasChart('chart');
      destroyCanvasChart('spotChart');
      resetCanvas('chart');
      resetCanvas('spotChart');
      const result = buildChart();
      chart = result.spreadChart;
      spotChartInstance = result.spotChart;
    }

    function buildChart() {
      if (!window.BENCHMARK_DATA) throw new Error('BENCHMARK_DATA is missing');

      const pair = getPair(state.pairKey);
      const compact = isCompact();
      const avgWin = pair.dataset === 'monthly' ? 12 : 20;
      const benchmarkKeys = getAvailableBenchmarks(pair);

      let labels = [];
      let spreadValues = [];
      let averageValues = [];
      let benchmarkSeries = {};

      if (pair.dataset === 'daily') {
        const pairRows = buildRowsForPair(pair);
        const anchor = pairRows[pairRows.length - 1]?.date ?? null;
        const dailyRows = filterByRange(pairRows, state.rangeKey, anchor);
        const dailySpreads = dailyRows.map(r => +(r[pair.left] - r[pair.right]).toFixed(2));
        const dailyMa = movingAverage(dailySpreads, avgWin);

        labels = dailyRows.map(r => r.date);
        spreadValues = dailySpreads;
        averageValues = dailyMa;
        benchmarkSeries = {
          wti: dailyRows.map(r => r.wti),
          brent: dailyRows.map(r => r.brent),
        };
      } else {
        const rows = filterByRange(buildRowsForPair(pair), state.rangeKey);
        labels = rows.map(r => r.date);
        spreadValues = rows.map(r => +(r[pair.left] - r[pair.right]).toFixed(2));
        averageValues = movingAverage(spreadValues, avgWin);
        benchmarkSeries = Object.fromEntries(
          benchmarkKeys.map(k => [k, rows.map(r => r[k] ?? null)])
        );
      }

      // Convert to {x, y} for time scale
      const spreadPoints = spreadValues.map((v, i) => v === null ? null : { x: dateToUtc(labels[i]), y: v }).filter(Boolean);
      const maPoints = averageValues.map((v, i) => v === null ? null : { x: dateToUtc(labels[i]), y: v }).filter(Boolean);

      const validSpread = spreadPoints.filter(Boolean);
      const chartMin = validSpread.length > 0 ? validSpread[0].x : undefined;
      const chartMax = validSpread.length > 0 ? validSpread[validSpread.length - 1].x : undefined;

      // Futures tenor datasets (on spread chart)
      const futuresDatasets = [];
      if (state.pairKey === 'brent_wti' && window.FUTURES_DATA && chartMin !== undefined) {
        for (const tenor of window.FUTURES_DATA.tenors) {
          if (!state.overlays[tenor]) continue;
          const fData = window.FUTURES_DATA[tenor];
          if (!fData || fData.rows.length === 0) continue;

          const points = fData.rows
            .map(r => ({ x: parseFuturesTs(r[0]), y: r[1] }))
            .filter(p => p.x >= chartMin && p.x <= chartMax);

          if (points.length === 0) continue;

          futuresDatasets.push({
            label: `${TENOR_LABELS[tenor]} Futures`,
            data: points,
            borderColor: TENOR_COLORS[tenor],
            backgroundColor: 'transparent',
            borderWidth: 1.5,
            pointRadius: 0, pointHitRadius: 6,
            tension: 0.14, spanGaps: false,
            yAxisID: 'y', order: 3,
          });
        }
      }

      // Time unit
      const spanMs = labels.length > 1 ? dateToUtc(labels[labels.length - 1]) - dateToUtc(labels[0]) : 0;
      const spanDays = spanMs / 86400000;
      let timeUnit = 'month';
      if (spanDays < 14) timeUnit = 'day';
      else if (spanDays < 90) timeUnit = 'week';
      else if (spanDays > 365 * 3) timeUnit = 'year';

      const xScaleConfig = {
        type: 'time',
        min: chartMin,
        max: chartMax,
        time: {
          unit: timeUnit,
          displayFormats: { day: 'MMM d', week: 'MMM d', month: 'MMM yyyy', year: 'yyyy' },
        },
        ticks: { color: '#7c7c85', maxRotation: 0, autoSkip: true, maxTicksLimit: compact ? 6 : 12 },
        grid: { color: 'rgba(255, 255, 255, 0)' },
      };

      // ── Spot price panel ──
      const showSpot = benchmarkKeys.some(k => state.overlays[k]);
      const spotPanel = document.getElementById('spotPanel');
      let spotChart = null;

      if (showSpot) {
        spotPanel.style.display = '';

        const spotDatasets = benchmarkKeys
          .filter(k => state.overlays[k])
          .map(k => ({
            label: getBenchmarkLabel(k),
            data: (benchmarkSeries[k] || []).map((v, i) => v === null ? null : { x: dateToUtc(labels[i]), y: v }).filter(Boolean),
            borderColor: SERIES_COLORS[k],
            backgroundColor: 'transparent',
            borderWidth: 1.7,
            pointRadius: 0, pointHitRadius: 6,
            tension: 0.12, spanGaps: true,
          }));

        spotChart = new Chart(document.getElementById('spotChart').getContext('2d'), {
          type: 'line',
          data: { datasets: spotDatasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'nearest', axis: 'x', intersect: false },
            plugins: {
              legend: { display: false },
              crosshairLine: {},
              tooltip: {
                enabled: false,
                mode: 'nearest',
                axis: 'x',
                intersect: false,
                external: function(context) {
                  buildCrosshairTooltip(context, pair);
                },
              },
            },
            scales: {
              x: { ...xScaleConfig, ticks: { display: false }, grid: { color: 'rgba(255, 255, 255, 0)' } },
              y: {
                ticks: { color: '#7c7c85', callback(v) { return `$${v}`; } },
                grid: { color: 'rgba(255, 255, 255, 0.05)' },
              },
            },
          },
        });
      } else {
        spotPanel.style.display = 'none';
      }

      // ── Spread chart ──
      const spreadChart = new Chart(document.getElementById('chart').getContext('2d'), {
        type: 'line',
        data: {
          datasets: [
            {
              label: pair.label,
              data: spreadPoints,
              borderColor: SERIES_COLORS.spread,
              backgroundColor: 'rgba(91, 155, 247, 0.10)',
              fill: true,
              borderWidth: 2,
              pointRadius: 0, pointHitRadius: 6,
              tension: 0.14, spanGaps: true,
              yAxisID: 'y', order: 2,
            },
            {
              label: getMaLabel(pair),
              data: maPoints,
              borderColor: SERIES_COLORS.ma,
              backgroundColor: 'transparent',
              borderWidth: 1.8,
              pointRadius: 0, pointHitRadius: 6,
              tension: 0.2, spanGaps: true,
              hidden: !state.overlays.ma,
              yAxisID: 'y', order: 1,
            },
            ...futuresDatasets,
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'nearest', axis: 'x', intersect: false },
          plugins: {
            legend: { display: false },
            crosshairLine: {},
            annotation: {
              annotations: {
                zeroLine: {
                  type: 'line', yMin: 0, yMax: 0,
                  borderColor: 'rgba(255, 255, 255, 0.12)',
                  borderWidth: 1, borderDash: [4, 3],
                  drawTime: 'beforeDatasetsDraw',
                },
              },
            },
            tooltip: {
              enabled: false,
              mode: 'nearest',
              axis: 'x',
              intersect: false,
              external: function(context) {
                buildCrosshairTooltip(context, pair);
              },
            },
          },
          scales: {
            x: xScaleConfig,
            y: {
              ticks: { color: '#7c7c85', callback(v) { return `$${v.toFixed(1)}`; } },
              grid: { color: 'rgba(255, 255, 255, 0.05)' },
            },
          },
        },
      });

      return { spreadChart, spotChart };
    }

    /* ── Term structure chart ──────────────────────────────────── */

    let termChart = null;

    function rebuildTermChart() {
      if (termChart) termChart.destroy();
      termChart = buildTermStructureChart();
      document.getElementById('termSection').style.display =
        (state.pairKey === 'brent_wti' && window.FUTURES_DATA) ? '' : 'none';
    }

    function buildTermStructureChart() {
      if (!window.FUTURES_DATA || !window.BENCHMARK_DATA) return null;

      const cats = ['Spot', '1m', '2m', '3m', '6m', '12m', '24m'];
      const values = [];
      const dates = [];

      const spotRows = buildRowsForPair(PAIRS[0]);
      if (spotRows.length > 0) {
        const last = spotRows[spotRows.length - 1];
        values.push(+(last.brent - last.wti).toFixed(2));
        dates.push(last.date);
      } else { values.push(null); dates.push(null); }

      for (const tenor of window.FUTURES_DATA.tenors) {
        const data = window.FUTURES_DATA[tenor];
        if (data && data.rows.length > 0) {
          const lastRow = data.rows[data.rows.length - 1];
          values.push(lastRow[1]);
          dates.push(lastRow[0].split(' ')[0]);
        } else { values.push(null); dates.push(null); }
      }

      const latestDate = dates.filter(Boolean).sort().pop();
      const metaEl = document.getElementById('termMeta');
      if (metaEl && latestDate) metaEl.textContent = `Futures as of ${fmtDate(latestDate)}`;

      const barColors = values.map(v =>
        v === null ? 'rgba(0,0,0,0)' : v >= 0 ? 'rgba(91, 155, 247, 0.40)' : 'rgba(248, 113, 113, 0.30)'
      );
      const borderColors = values.map(v =>
        v === null ? 'rgba(0,0,0,0)' : v >= 0 ? 'rgba(91, 155, 247, 0.65)' : 'rgba(248, 113, 113, 0.55)'
      );

      return new Chart(document.getElementById('termChart').getContext('2d'), {
        type: 'bar',
        data: {
          labels: cats,
          datasets: [{ data: values, backgroundColor: barColors, borderColor: borderColors, borderWidth: 1, borderRadius: 4 }],
        },
        plugins: [{
          id: 'barValueLabels',
          afterDraw(chart) {
            const ctx = chart.ctx;
            const meta = chart.getDatasetMeta(0);
            chart.data.datasets[0].data.forEach((val, i) => {
              if (val === null) return;
              const bar = meta.data[i];
              ctx.save();
              ctx.textAlign = 'center';
              ctx.textBaseline = val >= 0 ? 'bottom' : 'top';
              ctx.fillStyle = '#7c7c85';
              ctx.font = '600 11px "Inter", sans-serif';
              ctx.fillText(`$${val.toFixed(2)}`, bar.x, val >= 0 ? bar.y - 4 : bar.y + 4);
              ctx.restore();
            });
          },
        }],
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            annotation: {
              annotations: {
                zeroLine: {
                  type: 'line', yMin: 0, yMax: 0,
                  borderColor: 'rgba(255, 255, 255, 0.12)',
                  borderWidth: 1, borderDash: [4, 3],
                  drawTime: 'beforeDatasetsDraw',
                },
              },
            },
            tooltip: {
              backgroundColor: '#242429',
              borderColor: 'rgba(255, 255, 255, 0.07)',
              borderWidth: 1,
              titleColor: '#ededf0', bodyColor: '#7c7c85',
              padding: 10, displayColors: false,
              callbacks: {
                label(ctx) { return ctx.parsed.y === null ? '—' : `$${ctx.parsed.y.toFixed(2)}`; },
              },
            },
          },
          scales: {
            x: {
              ticks: { color: '#7c7c85', font: { weight: 600, size: 12 } },
              grid: { color: 'rgba(255, 255, 255, 0)' },
            },
            y: {
              ticks: { color: '#7c7c85', callback(v) { return `$${v.toFixed(1)}`; } },
              grid: { color: 'rgba(255, 255, 255, 0.05)' },
            },
          },
        },
      });
    }

    /* ── Render all + Init ─────────────────────────────────────── */

    function renderAll() {
      renderPairTabs();
      renderToolbar();
      renderLegend();
      renderCallout();
      renderStats();
      renderFooter();
      rebuildTermChart();
      rebuildChart();
    }

    renderAll();

    let lastCompact = isCompact();
    let resizeFrame = null;

    window.addEventListener('resize', () => {
      if (resizeFrame !== null) cancelAnimationFrame(resizeFrame);
      resizeFrame = requestAnimationFrame(() => {
        resizeFrame = null;
        const compact = isCompact();
        if (compact !== lastCompact) {
          lastCompact = compact;
          rebuildChart();
          rebuildTermChart();
          return;
        }
        if (chart) chart.resize();
        if (spotChartInstance) spotChartInstance.resize();
        if (termChart) termChart.resize();
      });
    });
  </script>
</body>
