name: Refresh Daily Data

on:
  workflow_dispatch:
  schedule:
    # Hourly during NYMEX/ICE trading hours, weekdays only.
    # 14:00-21:00 UTC covers US market open through settlement.
    - cron: '0 14-21 * * 1-5'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Refresh generated datasets
        run: |
          python refresh_spread_history.py
          python build_benchmark_dataset.py
          python build_spread_market_dataset.py
          python build_spread_stock_dataset.py

      - name: Build public site bundle
        run: python build_site_bundle.py

      - name: Stage refreshed files
        id: changes
        run: |
          git add \
            all_data.js \
            benchmark_data.js \
            wti_fred.csv \
            brent_fred.csv \
            wti_yf.csv \
            brent_yf.csv \
            wti_monthly_fred.csv \
            brent_monthly_fred.csv \
            dubai_monthly_fred.csv \
            sp500_fred.txt \
            nasdaqcom_fred.txt \
            djia_fred.txt \
            vixcls_fred.txt \
            spread_vs_market_indexes.csv \
            spread_vs_market_summary.md \
            spread_vs_market_indexes_complete.csv \
            spread_vs_market_complete_summary.md \
            spread_vs_sp500.csv \
            spread_vs_sp500_summary.md
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit refreshed data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Refresh benchmark data"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload GitHub Pages artifact
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        id: deployment
        uses: actions/deploy-pages@v4
