<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crude Oil Spot Spreads</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f4ecdf;
    --panel: rgba(255, 249, 240, 0.94);
    --border: rgba(72, 58, 43, 0.14);
    --text: #17120d;
    --muted: #6f6153;
    --shadow: 0 22px 44px rgba(52, 35, 16, 0.10);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top right, rgba(27, 104, 120, 0.12), transparent 34%),
      radial-gradient(circle at bottom left, rgba(183, 106, 34, 0.10), transparent 28%),
      linear-gradient(180deg, #f8f2e8 0%, #ede2d1 100%);
  }

  .page {
    max-width: 1240px;
    margin: 0 auto;
    padding: 24px 16px 32px;
  }

  h1 {
    margin-bottom: 18px;
    color: var(--text);
    font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
    font-size: clamp(30px, 5vw, 48px);
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 0.98;
  }

  .toolbar {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
    padding: 12px 14px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0.32) 100%),
      var(--panel);
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
  }

  .toolbar-row {
    display: flex;
    gap: 8px;
    align-items: center;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .toolbar-row::-webkit-scrollbar {
    display: none;
  }

  .toolbar-label {
    flex: 0 0 auto;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    margin-right: 4px;
  }

  .chip {
    flex: 0 0 auto;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.72);
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
  }

  .chip:hover,
  .chip.active {
    border-color: rgba(27, 104, 120, 0.32);
    background: rgba(27, 104, 120, 0.10);
    color: #1b6878;
    transform: translateY(-1px);
  }

  .chip:disabled {
    opacity: 0.42;
    cursor: not-allowed;
    transform: none;
    color: var(--muted);
    background: rgba(255, 255, 255, 0.42);
  }

  .chart-shell {
    padding: 18px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.34) 100%),
      var(--panel);
    border: 1px solid var(--border);
    border-radius: 28px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
  }

  .chart-frame {
    position: relative;
    width: 100%;
    height: clamp(360px, calc(100vh - 240px), 720px);
    min-height: 360px;
  }

  canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  h2 {
    margin: 32px 0 18px;
    color: var(--text);
    font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
    font-size: clamp(22px, 3.5vw, 32px);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .futures-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .futures-chart-shell {
    padding: 14px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.34) 100%),
      var(--panel);
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
  }

  .futures-chart-shell h3 {
    margin-bottom: 8px;
    color: var(--muted);
    font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .futures-chart-frame {
    position: relative;
    width: 100%;
    height: 260px;
  }

  .futures-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 260px;
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }

  @media (max-width: 760px) {
    .page {
      padding: 18px 12px 20px;
    }

    h1 {
      margin-bottom: 14px;
      font-size: clamp(28px, 9vw, 40px);
    }

    .toolbar {
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 18px;
    }

    .chart-shell {
      padding: 12px;
      border-radius: 22px;
    }

    .chart-frame {
      height: clamp(320px, calc(100vh - 220px), 560px);
      min-height: 320px;
    }

    .futures-grid {
      grid-template-columns: 1fr;
    }

    .futures-chart-frame {
      height: 220px;
    }

    .futures-empty {
      height: 220px;
    }

    h2 {
      margin: 24px 0 14px;
    }
  }
</style>
</head>
<body>
  <main class="page">
    <h1>Crude Oil Spot Spreads</h1>
    <section class="toolbar">
      <div class="toolbar-row" id="pairControls">
        <span class="toolbar-label">Spread</span>
      </div>
      <div class="toolbar-row" id="seriesControls">
        <span class="toolbar-label">Lines</span>
      </div>
      <div class="toolbar-row" id="horizonControls">
        <span class="toolbar-label">View</span>
      </div>
    </section>
    <section class="chart-shell">
      <div class="chart-frame">
        <canvas id="chart"></canvas>
      </div>
    </section>
    <h2>Brent − WTI Futures Spread</h2>
    <section class="toolbar">
      <div class="toolbar-row" id="futuresHorizonControls">
        <span class="toolbar-label">View</span>
      </div>
    </section>
    <div class="futures-grid" id="futuresGrid"></div>
  </main>

  <script src="./benchmark_data.js"></script>
  <script src="./futures_data.js"></script>
  <script>
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const HORIZONS = [
      { key: '1d', label: '1D', days: 1 },
      { key: '1w', label: '1W', days: 7 },
      { key: '1m', label: '1M', days: 31 },
      { key: '6m', label: '6M', days: 183 },
      { key: '1y', label: '1Y', days: 365 },
      { key: '3y', label: '3Y', days: 365 * 3 },
      { key: '5y', label: '5Y', days: 365 * 5 },
      { key: '10y', label: '10Y', days: 365 * 10 },
      { key: '20y', label: '20Y', days: 365 * 20 },
      { key: 'max', label: 'MAX', days: null },
    ];
    const PAIRS = [
      { key: 'brent_wti', label: 'Brent − WTI Spot', dataset: 'daily', left: 'brent', right: 'wti' },
      { key: 'brent_dubai', label: 'Brent − Dubai (Mo. Avg)', dataset: 'monthly', left: 'brent', right: 'dubai' },
      { key: 'wti_dubai', label: 'WTI − Dubai (Mo. Avg)', dataset: 'monthly', left: 'wti', right: 'dubai' },
    ];
    const SERIES_COLORS = {
      spread: '#1b6878',
      movingAverage: '#b76a22',
      wti: '#5d7d45',
      brent: '#8a543f',
      dubai: '#6b5aa6',
    };
    const state = {
      pairKey: 'brent_wti',
      horizonKey: '10y',
      seriesVisibility: {
        spread: true,
        ma: true,
        wti: false,
        brent: false,
        dubai: false,
      },
    };

    function isCompactViewport() {
      return window.matchMedia('(max-width: 760px)').matches;
    }

    function getPair(key) {
      return PAIRS.find(item => item.key === key) ?? PAIRS[0];
    }

    function getBenchmarkLabel(key, pair) {
      const base = window.BENCHMARK_DATA.benchmarkLabels[key] ?? key;
      if (!pair) return base;
      // Daily pair: WTI & Brent are spot, Dubai is monthly avg
      if (pair.dataset === 'daily') {
        return key === 'dubai' ? `${base} (Mo. Avg)` : `${base} Spot`;
      }
      // Monthly pair: everything is monthly avg
      return `${base} (Mo. Avg)`;
    }

    function getMaLabel(pair) {
      return pair.dataset === 'monthly' ? '12m MA' : '20d MA';
    }

    function getTooltipDate(value, pair) {
      const [year, month, day] = value.split('-');
      if (pair.dataset === 'monthly') {
        return `${monthNames[Number(month) - 1]} ${year}`;
      }
      return `${monthNames[Number(month) - 1]} ${Number(day)}, ${year}`;
    }

    function formatAxisTick(dateValue, totalPoints, compact, pair) {
      const [year, month, day] = dateValue.split('-');
      const monthLabel = monthNames[Number(month) - 1];

      if (pair.dataset === 'monthly') {
        if (totalPoints > 180) return year;
        if (totalPoints > 60) return compact ? [monthLabel, year] : `${monthLabel} ${year}`;
        return compact ? [monthLabel, year] : `${monthLabel} ${year}`;
      }

      if (totalPoints > 5200) return year;
      if (totalPoints > 1200) return compact ? [monthLabel, year] : `${monthLabel} ${year}`;
      if (totalPoints > 260) return compact ? [monthLabel, year] : `${monthLabel} ${year}`;
      return `${monthLabel} ${Number(day)}`;
    }

    function getHorizon(key) {
      return HORIZONS.find(item => item.key === key) ?? HORIZONS[0];
    }

    function dateToUtc(value) {
      const [year, month, day] = value.split('-').map(Number);
      return Date.UTC(year, month - 1, day);
    }

    function filterRowsByHorizon(rows, key, anchorDate = null) {
      const horizon = getHorizon(key);
      if (horizon.days === null || rows.length === 0) return rows.slice();

      const latestTime = dateToUtc(anchorDate ?? rows[rows.length - 1].date);
      const cutoff = latestTime - (horizon.days * 24 * 60 * 60 * 1000);
      return rows.filter(row => dateToUtc(row.date) >= cutoff);
    }

    function movingAverage(values, windowSize) {
      return values.map((_, index) => {
        if (index < windowSize - 1) return null;
        let sum = 0;
        for (let cursor = index - windowSize + 1; cursor <= index; cursor += 1) {
          sum += values[cursor];
        }
        return +(sum / windowSize).toFixed(2);
      });
    }

    function buildRowsForDataset(datasetKey) {
      const dataset = window.BENCHMARK_DATA[datasetKey];
      if (!dataset) {
        throw new Error(`Missing dataset for ${datasetKey}`);
      }

      return dataset.rows.map(rawRow => {
        const row = { date: rawRow[0] };
        dataset.columns.forEach((column, index) => {
          row[column] = rawRow[index + 1];
        });
        return row;
      });
    }

    function buildRowsForPair(pair) {
      const dataset = window.BENCHMARK_DATA[pair.dataset];
      if (!dataset) {
        throw new Error(`Missing dataset for ${pair.dataset}`);
      }

      return buildRowsForDataset(pair.dataset).filter(row => row[pair.left] !== null && row[pair.right] !== null);
    }

    function getAvailableBenchmarks(pair) {
      if (pair.dataset === 'daily') {
        return ['wti', 'brent', 'dubai'];
      }
      return window.BENCHMARK_DATA[pair.dataset].columns;
    }

    function getSelectedSeriesCount() {
      return Object.values(state.seriesVisibility).filter(Boolean).length;
    }

    function renderToolbar() {
      const currentPair = getPair(state.pairKey);
      const availableBenchmarks = new Set(getAvailableBenchmarks(currentPair));
      const selectedSeriesCount = getSelectedSeriesCount();

      document.getElementById('pairControls').innerHTML = `
        <span class="toolbar-label">Spread</span>
        ${PAIRS.map(pair => `
          <button class="chip ${state.pairKey === pair.key ? 'active' : ''}" data-pair="${pair.key}">
            ${pair.label}
          </button>
        `).join('')}
      `;

      document.getElementById('seriesControls').innerHTML = `
        <span class="toolbar-label">Lines</span>
        <button
          class="chip ${state.seriesVisibility.spread ? 'active' : ''}"
          data-series="spread"
          ${state.seriesVisibility.spread && selectedSeriesCount === 1 ? 'disabled' : ''}
        >${currentPair.label}</button>
        <button
          class="chip ${state.seriesVisibility.ma ? 'active' : ''}"
          data-series="ma"
          ${state.seriesVisibility.ma && selectedSeriesCount === 1 ? 'disabled' : ''}
        >${getMaLabel(currentPair)}</button>
        ${['wti', 'brent', 'dubai'].map(key => `
          <button
            class="chip ${state.seriesVisibility[key] && availableBenchmarks.has(key) ? 'active' : ''}"
            data-series="${key}"
            ${state.seriesVisibility[key] && selectedSeriesCount === 1 ? 'disabled' : ''}
          >
            ${getBenchmarkLabel(key, currentPair)}
          </button>
        `).join('')}
      `;

      document.getElementById('horizonControls').innerHTML = `
        <span class="toolbar-label">View</span>
        ${HORIZONS.map(horizon => `
          <button class="chip ${state.horizonKey === horizon.key ? 'active' : ''}" data-horizon="${horizon.key}">
            ${horizon.label}
          </button>
        `).join('')}
      `;

      document.querySelectorAll('[data-pair]').forEach(button => {
        button.addEventListener('click', () => {
          state.pairKey = button.dataset.pair;
          renderToolbar();
          rebuildChart();
        });
      });

      document.querySelectorAll('[data-series]').forEach(button => {
        button.addEventListener('click', () => {
          const key = button.dataset.series;
          if (state.seriesVisibility[key] && getSelectedSeriesCount() === 1) {
            return;
          }
          state.seriesVisibility[key] = !state.seriesVisibility[key];
          renderToolbar();
          rebuildChart();
        });
      });

      document.querySelectorAll('[data-horizon]').forEach(button => {
        button.addEventListener('click', () => {
          state.horizonKey = button.dataset.horizon;
          renderToolbar();
          rebuildChart();
        });
      });
    }

    function resetCanvasSize() {
      const canvas = document.getElementById('chart');
      canvas.removeAttribute('width');
      canvas.removeAttribute('height');
      canvas.style.width = '';
      canvas.style.height = '';
    }

    function rebuildChart() {
      if (chart) {
        chart.destroy();
      }
      resetCanvasSize();
      chart = buildChart();
    }

    function buildChart() {
      if (!window.BENCHMARK_DATA) {
        throw new Error('BENCHMARK_DATA is missing');
      }

      const pair = getPair(state.pairKey);
      const compact = isCompactViewport();
      const averageWindow = pair.dataset === 'monthly' ? 12 : 20;
      const benchmarkKeys = getAvailableBenchmarks(pair);
      let labels = [];
      let spreadValues = [];
      let averageValues = [];
      let benchmarkSeriesByKey = {};

      if (pair.dataset === 'daily') {
        const pairRows = buildRowsForPair(pair);
        const anchorDate = pairRows[pairRows.length - 1]?.date ?? null;
        const dailyRows = filterRowsByHorizon(pairRows, state.horizonKey, anchorDate);
        const dailySpreadValues = dailyRows.map(row => +(row[pair.left] - row[pair.right]).toFixed(2));
        const dailyAverageValues = movingAverage(dailySpreadValues, averageWindow);
        const monthlyRows = filterRowsByHorizon(
          buildRowsForDataset('monthly').filter(row => row.dubai !== null),
          state.horizonKey,
          anchorDate
        );

        const labelSet = new Set(dailyRows.map(row => row.date));
        if (state.seriesVisibility.dubai) {
          monthlyRows.forEach(row => labelSet.add(row.date));
        }
        labels = Array.from(labelSet).sort((left, right) => dateToUtc(left) - dateToUtc(right));

        const spreadByDate = new Map(dailyRows.map((row, index) => [row.date, dailySpreadValues[index]]));
        const averageByDate = new Map(dailyRows.map((row, index) => [row.date, dailyAverageValues[index]]));
        const wtiByDate = new Map(dailyRows.map(row => [row.date, row.wti]));
        const brentByDate = new Map(dailyRows.map(row => [row.date, row.brent]));
        const dubaiByDate = new Map(monthlyRows.map(row => [row.date, row.dubai]));

        spreadValues = labels.map(date => spreadByDate.get(date) ?? null);
        averageValues = labels.map(date => averageByDate.get(date) ?? null);
        benchmarkSeriesByKey = {
          wti: labels.map(date => wtiByDate.get(date) ?? null),
          brent: labels.map(date => brentByDate.get(date) ?? null),
          dubai: labels.map(date => dubaiByDate.get(date) ?? null),
        };
      } else {
        const rows = filterRowsByHorizon(buildRowsForPair(pair), state.horizonKey);
        labels = rows.map(row => row.date);
        spreadValues = rows.map(row => +(row[pair.left] - row[pair.right]).toFixed(2));
        averageValues = movingAverage(spreadValues, averageWindow);
        benchmarkSeriesByKey = Object.fromEntries(
          benchmarkKeys.map(key => [key, rows.map(row => row[key] ?? null)])
        );
      }

      const useLineSpread = pair.dataset === 'monthly' || labels.length > 1200;
      const benchmarkDatasets = benchmarkKeys.map(key => ({
        label: getBenchmarkLabel(key, pair),
        data: benchmarkSeriesByKey[key],
        type: 'line',
        borderColor: SERIES_COLORS[key],
        backgroundColor: 'transparent',
        borderWidth: 1.7,
        pointRadius: 0,
        pointHitRadius: 6,
        tension: 0.12,
        spanGaps: true,
        hidden: !state.seriesVisibility[key],
        yAxisID: 'y2',
        order: 0,
      }));

      return new Chart(document.getElementById('chart').getContext('2d'), {
        type: useLineSpread ? 'line' : 'bar',
        data: {
          labels,
          datasets: [
            useLineSpread
              ? {
                  label: pair.label,
                  data: spreadValues,
                  type: 'line',
                  borderColor: SERIES_COLORS.spread,
                  backgroundColor: 'rgba(27, 104, 120, 0.16)',
                  fill: true,
                  borderWidth: 2.2,
                  pointRadius: 0,
                  pointHitRadius: 6,
                  tension: 0.14,
                  spanGaps: true,
                  hidden: !state.seriesVisibility.spread,
                  yAxisID: 'y',
                  order: 2,
                }
              : {
                  label: pair.label,
                  data: spreadValues,
                  type: 'bar',
                  backgroundColor: spreadValues.map(value => value === null ? 'rgba(0, 0, 0, 0)' : (value >= 0 ? 'rgba(50, 105, 86, 0.46)' : 'rgba(164, 75, 54, 0.46)')),
                  borderColor: spreadValues.map(value => value === null ? 'rgba(0, 0, 0, 0)' : (value >= 0 ? 'rgba(50, 105, 86, 0.86)' : 'rgba(164, 75, 54, 0.86)')),
                  borderWidth: 1,
                  hidden: !state.seriesVisibility.spread,
                  yAxisID: 'y',
                  order: 2,
                },
            {
              label: getMaLabel(pair),
              data: averageValues,
              type: 'line',
              borderColor: SERIES_COLORS.movingAverage,
              backgroundColor: 'transparent',
              borderWidth: 1.8,
              pointRadius: 0,
              pointHitRadius: 6,
              tension: 0.2,
              spanGaps: true,
              hidden: !state.seriesVisibility.ma,
              yAxisID: 'y',
              order: 1,
            },
            ...benchmarkDatasets,
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false,
          },
          plugins: {
            legend: {
              display: false,
            },
            tooltip: {
              backgroundColor: '#fff7eb',
              borderColor: 'rgba(72, 58, 43, 0.18)',
              borderWidth: 1,
              titleColor: '#17120d',
              bodyColor: '#30261d',
              padding: 12,
              displayColors: false,
              callbacks: {
                title(items) {
                  return items.length ? getTooltipDate(items[0].label, pair) : '';
                },
                label(context) {
                  return context.parsed.y === null
                    ? `${context.dataset.label}: —`
                    : `${context.dataset.label}: $${context.parsed.y.toFixed(2)}`;
                },
              },
            },
          },
          scales: {
            x: {
              ticks: {
                color: '#6f6153',
                maxRotation: 0,
                autoSkip: true,
                maxTicksLimit: compact ? 6 : 12,
                padding: compact ? 10 : 8,
                callback(value) {
                  return formatAxisTick(this.getLabelForValue(value), labels.length, compact, pair);
                },
              },
              grid: {
                color: 'rgba(72, 58, 43, 0)',
              },
            },
            y: {
              ticks: {
                color: '#6f6153',
                callback(value) {
                  return `$${value.toFixed(1)}`;
                },
              },
              grid: {
                color: 'rgba(72, 58, 43, 0.08)',
              },
            },
            y2: {
              display: benchmarkKeys.some(key => state.seriesVisibility[key]),
              position: 'right',
              ticks: {
                color: '#6f6153',
                callback(value) {
                  return `$${value}`;
                },
              },
              grid: {
                drawOnChartArea: false,
              },
            },
          },
        },
      });
    }

    let chart = null;
    renderToolbar();
    rebuildChart();
    let lastCompactViewport = isCompactViewport();
    let resizeFrame = null;

    window.addEventListener('resize', () => {
      if (resizeFrame !== null) {
        cancelAnimationFrame(resizeFrame);
      }
      resizeFrame = requestAnimationFrame(() => {
        resizeFrame = null;
        const compact = isCompactViewport();
        if (compact !== lastCompactViewport) {
          lastCompactViewport = compact;
          rebuildChart();
          rebuildFuturesCharts();
          return;
        }
        chart.resize();
        futuresCharts.forEach(fc => { if (fc) fc.resize(); });
      });
    });

    /* ── Futures charts ─────────────────────────────────────── */

    const FUTURES_HORIZONS = [
      { key: '1m', label: '1M', days: 31 },
      { key: '6m', label: '6M', days: 183 },
      { key: '1y', label: '1Y', days: 365 },
      { key: '3y', label: '3Y', days: 365 * 3 },
      { key: '5y', label: '5Y', days: 365 * 5 },
      { key: 'max', label: 'MAX', days: null },
    ];

    const TENOR_DISPLAY = {
      '1m': '1-Month',
      '2m': '2-Month',
      '3m': '3-Month',
      '6m': '6-Month',
      '12m': '12-Month',
      '24m': '24-Month',
    };

    const futuresState = { horizonKey: '3y' };
    let futuresCharts = [];

    function parseFuturesTimestamp(ts) {
      // Handles both 'YYYY-MM-DD' and 'YYYY-MM-DD HH:MM'
      const parts = ts.split(' ');
      const [year, month, day] = parts[0].split('-').map(Number);
      if (parts.length > 1) {
        const [hour, minute] = parts[1].split(':').map(Number);
        return Date.UTC(year, month - 1, day, hour, minute);
      }
      return Date.UTC(year, month - 1, day);
    }

    function filterFuturesRows(rows, horizonKey) {
      const horizon = FUTURES_HORIZONS.find(h => h.key === horizonKey) ?? FUTURES_HORIZONS[0];
      if (horizon.days === null || rows.length === 0) return rows.slice();
      const latestTime = parseFuturesTimestamp(rows[rows.length - 1][0]);
      const cutoff = latestTime - (horizon.days * 24 * 60 * 60 * 1000);
      return rows.filter(row => parseFuturesTimestamp(row[0]) >= cutoff);
    }

    function formatFuturesTimestamp(ts) {
      // Returns display string for tooltip: 'Mon DD, YYYY' or 'Mon DD, YYYY HH:MM'
      const parts = ts.split(' ');
      const [year, month, day] = parts[0].split('-');
      const monthLabel = monthNames[Number(month) - 1];
      const base = `${monthLabel} ${Number(day)}, ${year}`;
      if (parts.length > 1) return `${base} ${parts[1]}`;
      return base;
    }

    function formatFuturesAxisTick(dateValue, totalPoints, compact) {
      const datePart = dateValue.split(' ')[0];
      const [year, month, day] = datePart.split('-');
      const monthLabel = monthNames[Number(month) - 1];
      if (totalPoints > 5000) return year;
      if (totalPoints > 1200) return compact ? [monthLabel, year] : `${monthLabel} ${year}`;
      if (totalPoints > 260) return compact ? [monthLabel, year] : `${monthLabel} ${year}`;
      return `${monthLabel} ${Number(day)}`;
    }

    function renderFuturesToolbar() {
      document.getElementById('futuresHorizonControls').innerHTML = `
        <span class="toolbar-label">View</span>
        ${FUTURES_HORIZONS.map(h => `
          <button class="chip ${futuresState.horizonKey === h.key ? 'active' : ''}" data-futures-horizon="${h.key}">
            ${h.label}
          </button>
        `).join('')}
      `;
      document.querySelectorAll('[data-futures-horizon]').forEach(button => {
        button.addEventListener('click', () => {
          futuresState.horizonKey = button.dataset.futuresHorizon;
          renderFuturesToolbar();
          rebuildFuturesCharts();
        });
      });
    }

    function renderFuturesGrid() {
      if (!window.FUTURES_DATA) return;
      const grid = document.getElementById('futuresGrid');
      grid.innerHTML = window.FUTURES_DATA.tenors.map(tenor => `
        <div class="futures-chart-shell">
          <h3>${TENOR_DISPLAY[tenor] ?? tenor}</h3>
          <div class="futures-chart-frame" id="futures-frame-${tenor}">
            <canvas id="futures-${tenor}"></canvas>
          </div>
        </div>
      `).join('');
    }

    function buildFuturesChart(tenor) {
      const data = window.FUTURES_DATA[tenor];
      if (!data || data.rows.length === 0) {
        const frame = document.getElementById(`futures-frame-${tenor}`);
        if (frame) {
          frame.innerHTML = '<div class="futures-empty">Accumulating data…</div>';
        }
        return null;
      }

      const compact = isCompactViewport();
      const rows = filterFuturesRows(data.rows, futuresState.horizonKey);
      if (rows.length === 0) {
        const frame = document.getElementById(`futures-frame-${tenor}`);
        if (frame) {
          frame.innerHTML = '<div class="futures-empty">No data for this time range</div>';
        }
        return null;
      }

      const labels = rows.map(r => r[0]);
      const spreadValues = rows.map(r => r[1]);
      const maValues = movingAverage(spreadValues, 20);
      const useLineSpread = labels.length > 500;

      const canvas = document.getElementById(`futures-${tenor}`);
      if (!canvas) return null;

      return new Chart(canvas.getContext('2d'), {
        type: useLineSpread ? 'line' : 'bar',
        data: {
          labels,
          datasets: [
            useLineSpread
              ? {
                  label: `Brent − WTI ${TENOR_DISPLAY[tenor]}`,
                  data: spreadValues,
                  type: 'line',
                  borderColor: SERIES_COLORS.spread,
                  backgroundColor: 'rgba(27, 104, 120, 0.16)',
                  fill: true,
                  borderWidth: 1.8,
                  pointRadius: 0,
                  pointHitRadius: 6,
                  tension: 0.14,
                  spanGaps: true,
                  order: 2,
                }
              : {
                  label: `Brent − WTI ${TENOR_DISPLAY[tenor]}`,
                  data: spreadValues,
                  type: 'bar',
                  backgroundColor: spreadValues.map(v => v >= 0 ? 'rgba(50, 105, 86, 0.46)' : 'rgba(164, 75, 54, 0.46)'),
                  borderColor: spreadValues.map(v => v >= 0 ? 'rgba(50, 105, 86, 0.86)' : 'rgba(164, 75, 54, 0.86)'),
                  borderWidth: 1,
                  order: 2,
                },
            {
              label: '20d MA',
              data: maValues,
              type: 'line',
              borderColor: SERIES_COLORS.movingAverage,
              backgroundColor: 'transparent',
              borderWidth: 1.4,
              pointRadius: 0,
              pointHitRadius: 6,
              tension: 0.2,
              spanGaps: true,
              order: 1,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#fff7eb',
              borderColor: 'rgba(72, 58, 43, 0.18)',
              borderWidth: 1,
              titleColor: '#17120d',
              bodyColor: '#30261d',
              padding: 10,
              displayColors: false,
              callbacks: {
                title(items) {
                  if (!items.length) return '';
                  return formatFuturesTimestamp(items[0].label);
                },
                label(ctx) {
                  return ctx.parsed.y === null
                    ? `${ctx.dataset.label}: —`
                    : `${ctx.dataset.label}: $${ctx.parsed.y.toFixed(2)}`;
                },
              },
            },
          },
          scales: {
            x: {
              ticks: {
                color: '#6f6153',
                maxRotation: 0,
                autoSkip: true,
                maxTicksLimit: compact ? 4 : 8,
                callback(value) {
                  return formatFuturesAxisTick(this.getLabelForValue(value), labels.length, compact);
                },
              },
              grid: { color: 'rgba(72, 58, 43, 0)' },
            },
            y: {
              ticks: {
                color: '#6f6153',
                callback(value) { return `$${value.toFixed(1)}`; },
              },
              grid: { color: 'rgba(72, 58, 43, 0.08)' },
            },
          },
        },
      });
    }

    function rebuildFuturesCharts() {
      futuresCharts.forEach(fc => { if (fc) fc.destroy(); });
      futuresCharts = [];
      renderFuturesGrid();
      if (!window.FUTURES_DATA) return;
      for (const tenor of window.FUTURES_DATA.tenors) {
        futuresCharts.push(buildFuturesChart(tenor));
      }
    }

    renderFuturesToolbar();
    rebuildFuturesCharts();
  </script>
</body>
</html>
